name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional commit types (customise as needed)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            deps
          # Require a scope? Set to true if you want e.g. feat(api): ...
          requireScope: false
          # Enforce lowercase subject
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The PR title "{title}" doesn't match conventional commits.
            Expected format: type(scope?): lowercase description
            Example: feat(auth): add login endpoint